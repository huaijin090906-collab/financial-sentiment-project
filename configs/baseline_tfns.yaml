experiment:
  name: baseline_tfns

data:
  train_path: data/processed/tfns/train.csv
  text_column: text
  label_column: label
  eval_sets:
    - name: tfns_val
      path: data/processed/tfns/val.csv
    - name: tfns_test
      path: data/processed/tfns/test.csv
    - name: fpb_test
      path: data/processed/fpb/test.csv

model:
  max_features: 20000
  min_df: 2
  ngram_range: [1, 2]
  C: 2.0
  max_iter: 500
  class_weight: balanced

output:
  metrics_dir: outputs/metrics
  predictions_dir: outputs/predictions
  logs_dir: outputs/logs
  checkpoints_dir: outputs/checkpoints
