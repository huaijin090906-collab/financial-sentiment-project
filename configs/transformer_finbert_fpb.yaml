experiment:
  name: finbert_fpb

model:
  name: ProsusAI/finbert
  max_length: 128

data:
  train_path: data/processed/fpb/train.csv
  val_path: data/processed/fpb/val.csv
  text_column: text
  label_column: label
  eval_sets:
    - name: fpb_val
      path: data/processed/fpb/val.csv
    - name: fpb_test
      path: data/processed/fpb/test.csv
    - name: tfns_test
      path: data/processed/tfns/test.csv

training:
  epochs: 4
  train_batch_size: 16
  eval_batch_size: 32
  learning_rate: 0.00002
  weight_decay: 0.01
  warmup_ratio: 0.1
  early_stopping_patience: 2
  logging_steps: 50
  seed: 42

output:
  metrics_dir: outputs/metrics/transformer_baselines
  predictions_dir: outputs/predictions/transformer_baselines
  figures_dir: outputs/figures/transformer_baselines
  logs_dir: outputs/logs/transformer_baselines
  checkpoints_dir: outputs/checkpoints/transformer_baselines
